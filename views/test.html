<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BART Map</title>

        <!-- Styles -->
        <link rel="stylesheet" href="/public/styles/main.css" />
    </head>

    <body>
        <div id="app">
            <!-- ============================= -->
            <!-- SIDE PANEL -->
            <!-- ============================= -->
            <div class="col" id="side-panel">
                <!-- HEADER -->
                <div class="panel-header">
                    <h2 id="station-name">Select a station</h2>
                    <span id="station-id"></span>
                    <span id="station-addr"></span>
                </div>

                <!-- TABS -->
                <div class="tabs">
                    <button class="tab active" data-tab="departures">Departures</button>
                    <button class="tab" data-tab="schedule">Schedule</button>
                    <button class="tab" data-tab="fares">Fares</button>
                    <button class="tab" data-tab="info">Info</button>
                </div>

                <!-- CONTENT -->
                <div class="tab-content active" id="tab-departures">
                    <div id="departures"></div>
                </div>

                <div class="tab-content" id="tab-schedule">
                    <div id="schedule"></div>
                </div>

                <div class="tab-content" id="tab-fares">
                    <div id="fares"></div>
                </div>

                <div class="tab-content" id="tab-info">
                    <div id="info"></div>
                </div>

                <!-- resize handle -->
                <div id="resize-handle"></div>
            </div>
        </div>

        <!-- ============================= -->
        <!-- SCRIPT -->
        <!-- ============================= -->
        <script type="module" src="/public/scripts/metro.js"></script>
        
        <!-- Vercel Web Analytics -->
        <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    </body>
</html>
