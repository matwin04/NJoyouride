<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NJoy Your Ride</title>
        <meta property="description" content="Search engine description" />
        <meta property="og:image" content="/public/icons/favicon.svg" />
        <!-- Styles -->
        <link rel="icon" type="image/x-icon" href="/public/icons/favicon.svg" />

        <link rel="stylesheet" href="/public/styles/main.css" />
    </head>

    <body>
        <div class="navbar">
            <div class="nav-title">Transit Map</div>
            <button id="theme-toggle" class="theme-btn">
                <span class="mdi mdi-weather-night"></span>
            </button>
        </div>
        <div id="app">
            <!-- ============================= -->
            <!-- SIDE PANEL -->
            <!-- ============================= -->

            <div class="col" id="side-panel">
                <!-- HEADER -->
                <div class="panel-header">
                    <h2 id="station-name">Select a station</h2>
                    <span id="station-id"></span>
                    <span id="station-addr"></span>
                    <div id="access"></div>
                </div>

                <!-- TABS -->
                <div class="tabs">
                    <button class="tab active" data-tab="departures">Departures</button>
                    <button class="tab" data-tab="connections">Connections</button>
                    <button class="tab" data-tab="bikeshare">Bikeshare</button>
                    <button class="tab" data-tab="discover">Discover</button>
                    <button class="tab" data-tab="info">Info</button>
                </div>

                <!-- CONTENT -->
                <div class="tab-content active" id="tab-departures">
                    <div id="destination"></div>
                    <div id="departures"></div>
                </div>

                <div class="tab-content" id="tab-connections">
                    <div id="connections"></div>
                </div>
                <div class="tab-content" id="tab-info">
                    <div id="info"></div>
                </div>

                <div class="tab-content" id="tab-bikeshare">
                    <span class="mdi mdi-bicycle"></span>BikeShare Systems Nearby
                    <div class="bikeshare-station"></div>
                    <div id="bikeshare"></div>
                </div>

                <div class="tab-content" id="tab-discover">
                    <div id="discover"></div>
                </div>

                <!-- resize handle -->
                <div id="resize-handle"></div>
            </div>

            <div class="col" id="svg-container"></div>
        </div>

        <!-- ============================= -->
        <!-- SCRIPT -->
        <!-- ============================= -->
        <script type="module" src="/public/scripts/metro.js"></script>
        <script>
            window.va =
                window.va ||
                function () {
                    (window.vaq = window.vaq || []).push(arguments);
                };
        </script>
        <script defer src="/<unique-path>/script.js"></script>
    </body>
</html>
